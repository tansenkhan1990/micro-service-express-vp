services:
  mongo:
    image: mongo:7
    container_name: express-auth-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: express-auth
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: express-auth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: production
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    profiles:
      - prod
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - MONGO_URI=mongodb://mongo:27017/express-auth
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-15m}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
      target: production
    container_name: user-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    profiles:
      - prod
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/express-auth

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: production
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    profiles:
      - prod
    depends_on:
      - auth-service
      - user-service
      - redis
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002

  auth-service-dev:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: builder
    container_name: auth-service-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    profiles:
      - dev
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth-service/src:/app/services/auth-service/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
    working_dir: /app/services/auth-service
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - MONGO_URI=mongodb://mongo:27017/express-auth
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:-dev_access_secret}
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-15m}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-dev_refresh_secret}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-7d}
    command: npm run dev

  user-service-dev:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
      target: builder
    container_name: user-service-dev
    restart: unless-stopped
    ports:
      - "3002:3002"
    profiles:
      - dev
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./services/user-service/src:/app/services/user-service/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
    working_dir: /app/services/user-service
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/express-auth
    command: npm run dev

  api-gateway-dev:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: builder
    container_name: api-gateway-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    profiles:
      - dev
    depends_on:
      - auth-service-dev
      - user-service-dev
      - redis
    volumes:
      - ./services/api-gateway/src:/app/services/api-gateway/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
    working_dir: /app/services/api-gateway
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:-dev_access_secret}
      - AUTH_SERVICE_URL=http://auth-service-dev:3001
      - USER_SERVICE_URL=http://user-service-dev:3002
    command: npm run dev

volumes:
  mongo_data:
  redis_data:
